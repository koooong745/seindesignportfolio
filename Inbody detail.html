<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail - 김세인 디자인 포트폴리오</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        @font-face {
            font-family: 'LCT-Ciburial-Regular';
            src: url('fonts/LCT-Ciburial-Regular.otf') format('opentype');
            font-weight: 400;
            unicode-range: U+0020-007E;
        }

        :root {
            --primary-red: #E11227;
            --bg-dark: #101620;
            --text-gray: #595959;
            --light-gray: #f2f2f2;
        }

        body {
            font-family: 'LCT-Ciburial-Regular', 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: var(--bg-dark);
        }

        /* 상단 헤더 영역 */
        .detail-header {
            padding: 60px 10% 40px;
            background-color: #fff;
            position: sticky;
            /* 스크롤 시 상단 고정 (선택 사항) */
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--light-gray);
        }

        .back-link {
            text-decoration: none;
            color: var(--text-gray);
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 15px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary-red);
        }

        .detail-header h1 {
            font-size: 2rem;
            margin: 0;
            font-weight: 700;
        }

        /* 이미지 컨테이너 */
        .image-container {
            width: 100%;
            max-width: 1200px;
            /* 이미지 최대 너비 제한 */
            margin: 0 auto;
            padding: 20px 0 100px;
        }

        .image-item {
            width: 100%;
            margin-bottom: 0;
            /* 이미지 사이 틈 없이 붙이려면 0, 간격을 두려면 20px 정도로 수정 */
            line-height: 0;
            /* 이미지 사이의 미세한 공백 제거 */
        }

        .image-item img {
            width: 100%;
            height: auto;
            display: block;
            cursor: zoom-in;
            transition: opacity 0.3s;
        }

        .image-item img:hover {
            opacity: 0.95;
        }

        /* 라이트박스 (이미지 확대) */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.3s ease;
            cursor: zoom-out;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .lightbox.active img {
            transform: scale(1);
        }

        /* 푸터 영역 */
        footer {
            background-color: var(--bg-dark);
            color: #fff;
            padding: 80px 10%;
            text-align: center;
        }

        .btn-list {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-list:hover {
            background-color: #fff;
            color: var(--bg-dark);
        }
    </style>
</head>

<body>

    <div class="detail-header">
        <a href="index.html" class="back-link">← Back to Overview</a>
        <h1>InBody : Brand Graphic System</h1>
    </div>

    <div class="image-container">
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_04.jpg" alt="Work 01"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_05.jpg" alt="Work 02"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_06.jpg" alt="Work 03"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_07.jpg" alt="Work 04"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_08.jpg" alt="Work 05"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_09.jpg" alt="Work 06"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_10.jpg" alt="Work 07"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_11.jpg" alt="Work 08"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_12.jpg" alt="Work 09"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_13.jpg" alt="Work 10"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_14.jpg" alt="Work 11"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_15.jpg" alt="Work 12"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_16.jpg" alt="Work 13"></div>
        <div class="image-item"><img src="images/포트폴리오_김세인_Page_17.jpg" alt="Work 14"></div>
    </div>

        <footer class="site-footer">
        <p class="footer-tagline">Visual storytelling for Brand</p>
        <p class="footer-contact">koooong745@gmail.com<br>+01 4930 1082</p>
        <p class="footer-copy">©seindesign 2026. All rights reserved</p>
        <span class="footer-name">KIM SE IN</span>
    </footer>

    <!-- 라이트박스 -->
    <div class="lightbox" id="lightbox">
        <img src="" alt="Expanded Image">
    </div>

    <script>
        const images = document.querySelectorAll('.image-item img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = lightbox.querySelector('img');

        images.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
            });
        });

        // 배경이나 이미지를 클릭하면 닫힘
        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });
    </script>
</body>

</html>
