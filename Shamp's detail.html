<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail - 김세인 디자인 포트폴리오</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        @font-face {
            font-family: 'LCT-Ciburial-Regular';
            src: url('fonts/LCT-Ciburial-Regular.otf') format('opentype');
            font-weight: 400;
            unicode-range: U+0020-007E;
        }

        :root {
            --primary-red: #E11227;
            --bg-dark: #101620;
            --text-gray: #595959;
            --light-gray: #f2f2f2;
        }

        body {
            font-family: 'LCT-Ciburial-Regular', 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #15211D;
            color: #fff;
        }

        /* 상단 헤더 영역 */
        .detail-header {
            padding: 60px 10% 40px;
            background-color: #15211D;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-link {
            text-decoration: none;
            color: #a2a2a2;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 15px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary-red);
        }

        .detail-header h1 {
            font-size: 2rem;
            margin: 0;
            font-weight: 700;
            color: #fff;
        }

        /* 나열형 컨테이너 */
        .linear-container {
            width: 90%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 0 100px;
        }

        /* 프로젝트 정보 텍스트 블록 (다크 테마) */
        .project-info {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 60px;
            font-size: 1rem;
            line-height: 1.8;
            color: #fff;
        }

        .info-row {
            display: flex;
            margin-bottom: 10px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            width: 120px;
            font-weight: 600;
            color: #e0e0e0;
            flex-shrink: 0;
        }

        .info-value {
            color: #ccc;
        }

        .section-title {
            font-size: 1rem;
            font-weight: normal;
            color: #e0e0e0;
            text-align: center;
            margin-bottom: 30px;
            text-transform: capitalize;
        }

        .image-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 60px;
        }

        .image-stack img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            cursor: zoom-in;
            transition: opacity 0.3s;
        }

        .image-stack img:hover {
            opacity: 0.95;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 비율 */
            height: 0;
            overflow: hidden;
            width: 100%;
            border-radius: 8px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 라이트박스 */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.3s ease;
            cursor: zoom-out;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .lightbox.active img {
            transform: scale(1);
        }

        @media (max-width: 768px) {
            .info-row {
                flex-direction: column;
                margin-bottom: 20px;
            }

            .info-label {
                margin-bottom: 5px;
            }
        }
    
        /* ===== 통일 푸터 ===== */
        .site-footer {
            background-color: transparent;
            color: #000;
            padding: 60px 8% 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
        }

        .footer-copy {
            font-size: 0.72rem;
            color: #888;
            margin: 0 0 20px 0;
            font-weight: 400;
        }

        .footer-name {
            display: block;
            font-size: clamp(3rem, 16vw, 12rem);
            font-weight: 900;
            line-height: 0.88;
            letter-spacing: -0.02em;
            color: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
        }
        .site-footer,
        .footer-name {
            color: #F295A0;
        }
        </style>
</head>

<body>

    <div class="detail-header">
        <a href="index.html" class="back-link">← Back to Overview</a>
        <h1>[Shamp's filings] SNS contents</h1>
    </div>

    <div class="linear-container">

        <!-- 프로젝트 상세 정보 -->
        <div class="project-info">
            <div class="info-row">
                <div class="info-label">행사명</div>
                <div class="info-value">@22.48m2 아트갤러리 [Shamp's filings] 전시</div>
            </div>
            <div class="info-row">
                <div class="info-label">협업</div>
                <div class="info-value">@sonohae / 타이포그래피 / 포스터</div>
            </div>
            <div class="info-row">
                <div class="info-label">기여도</div>
                <div class="info-value">100%, 스토리보드/핸드드로잉/애니메이팅</div>
            </div>
            <div class="info-row">
                <div class="info-label">작업기간</div>
                <div class="info-value">약 3주 소요</div>
            </div>
        </div>

        <div class="image-stack">
            <img src="images/shamp's_1.png" alt="Still Cut 1">
            <img src="images/shamp's_2.png" alt="Still Cut 2">
        </div>

        <div class="video-container">
            <iframe src="https://player.vimeo.com/video/713118227?title=0&byline=0&portrait=0" frameborder="0"
                allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
        </div>

    </div>

            <footer class="site-footer">
        <p class="footer-copy">©seindesign 2026. All rights reserved</p>
        <span class="footer-name">KIM SE IN</span>
    </footer>

    <!-- 라이트박스 -->
    <div class="lightbox" id="lightbox">
        <img src="" alt="Expanded Image">
    </div>

    <script>
        const images = document.querySelectorAll('.image-stack img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = lightbox.querySelector('img');

        images.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
            });
        });

        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });
    </script>
</body>

</html>
